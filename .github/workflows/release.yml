# SessionLayer Agent — release supply chain (Session 22 / NFR-7).
#
# On a `v*` tag: build the release binary REPRODUCIBLY, emit a CycloneDX SBOM,
# a SLSA build-provenance attestation, and keyless (OIDC) cosign signatures —
# no long-lived signing key anywhere. The artifacts a node needs to run the
# verify-before-run/update gate (`sessionlayer-agent verify`) are the two
# Sigstore bundles produced here: the cosign blob-signature bundle and the
# provenance attestation bundle.
#
# All third-party actions are pinned to a full commit SHA (supply-chain
# hardening); the trailing `# vX.Y.Z` is the human-readable tag. Owner rule
# (S1/S2): this is inventory + integrity, NEVER an NVD/OWASP scanner.
name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write # gh release upload
      id-token: write # keyless OIDC for cosign + provenance
      attestations: write # build-provenance attestation
    env:
      BIN: sessionlayer-agent
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@2c7215f132e9ebf062739d9130488b56d53c060c # pinned commit
        with:
          toolchain: "1.95.0"

      - name: Install cargo-cyclonedx (SBOM) and cosign (signing)
        run: cargo install --locked --version 0.5.9 cargo-cyclonedx
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # SOURCE_DATE_EPOCH (tagged commit) + remapping BOTH the workspace and the
      # cargo registry out of the binary make it byte-reproducible for an
      # independent rebuilder on a different $HOME/$CARGO_HOME. (Residual: the std
      # sysroot path — bounded by pinning the exact toolchain, documented.)
      - name: Compute deterministic build env
        run: |
          echo "SOURCE_DATE_EPOCH=$(git log -1 --format=%ct)" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=--remap-path-prefix=$PWD=/build --remap-path-prefix=${CARGO_HOME:-$HOME/.cargo}/registry=/registry" >> "$GITHUB_ENV"

      - name: Reproducible release build
        run: cargo build --release --locked --bin "$BIN"

      - name: Verify reproducibility (double-build digest match)
        run: |
          d1=$(sha256sum "target/release/$BIN" | awk '{print $1}')
          CARGO_TARGET_DIR="$RUNNER_TEMP/repro" cargo build --release --locked --bin "$BIN"
          d2=$(sha256sum "$RUNNER_TEMP/repro/release/$BIN" | awk '{print $1}')
          echo "digest #1: $d1"; echo "digest #2: $d2"
          if [ "$d1" != "$d2" ]; then echo "::error::release binary is not reproducible"; exit 1; fi
          rm -rf "$RUNNER_TEMP/repro"

      - name: Generate SBOM (CycloneDX 1.5, reproducible)
        run: |
          cargo cyclonedx -f json --spec-version 1.5 --all --describe binaries
          # cargo-cyclonedx stamps a fresh metadata.timestamp + random serialNumber;
          # strip them so the SBOM is byte-reproducible (cargo-cyclonedx has no
          # --output-reproducible; 0.5.9 also caps at spec 1.5).
          jq -S 'del(.metadata.timestamp) | del(.serialNumber)' "${BIN}_bin.cdx.json" > "${BIN}.cdx.json"
          jq -e '.bomFormat=="CycloneDX" and .specVersion=="1.5" and (.components|length>0)' "${BIN}.cdx.json" >/dev/null

      - name: Attest build provenance (SLSA)
        id: attest
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            target/release/sessionlayer-agent
            sessionlayer-agent.cdx.json

      - name: Keyless cosign signatures (binary + SBOM)
        run: |
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${BIN}.cosign.sigstore.json" "target/release/$BIN"
          cosign sign-blob --yes --new-bundle-format \
            --bundle "${BIN}.cdx.json.cosign.sigstore.json" "${BIN}.cdx.json"

      - name: Assemble release artifacts
        run: |
          cp "target/release/$BIN" "$BIN"
          cp "${{ steps.attest.outputs.bundle-path }}" "${BIN}.provenance.sigstore.json"
          sha256sum "$BIN" "${BIN}.cdx.json" > SHA256SUMS

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.ref_name }} # via env — never interpolate a ref into the shell
        run: |
          gh release create "$TAG" \
            --title "Agent $TAG" \
            --notes "Signed, provenanced, reproducible release. Verify with \`sessionlayer-agent verify\` (NFR-7)." \
            || echo "release already exists — uploading assets"
          gh release upload "$TAG" --clobber \
            "$BIN" \
            "${BIN}.cdx.json" \
            "${BIN}.cosign.sigstore.json" \
            "${BIN}.cdx.json.cosign.sigstore.json" \
            "${BIN}.provenance.sigstore.json" \
            SHA256SUMS
