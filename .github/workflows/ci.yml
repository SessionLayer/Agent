# SessionLayer Agent — CI.
#
# ONE required job, id `gate`, so the branch-protection required check is
# literally `gate`. It runs the same scripts/gate.sh used locally and by
# `make agent-gate`, plus a cheap static assertion of the non-root container
# posture. All third-party actions are pinned to a full commit SHA (supply-chain
# hardening, NFR-7); the trailing `# vX.Y.Z` is the human-readable tag.
name: ci

on:
  push:
  pull_request:

# Least privilege: the gate only reads the repo.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends protobuf-compiler
          protoc --version

      - name: Install Rust toolchain (pinned by rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # pinned commit (action publishes no semver tags)
        with:
          toolchain: "1.95.0"
          components: rustfmt, clippy
          # arm64 std for the aarch64 build-level proof (S24 / carry-forward B4).
          targets: aarch64-unknown-linux-gnu

      - name: Cache cargo build
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-nextest, cargo-deny, cargo-audit (pinned)
        uses: taiki-e/install-action@c7eb1735f09259a5035e8e5d44b1406b1cddc0fb # v2.83.0
        with:
          # Pin the supply-chain enforcers themselves so the gate is reproducible
          # (NFR-7) — bump via reviewed PRs, matching the toolchain/action pins.
          tool: cargo-nextest@0.9.135,cargo-deny@0.19.6,cargo-audit@0.22.1

      - name: Assert non-root container posture (static)
        run: ./scripts/check-dockerfile-nonroot.sh

      - name: Gate (fmt, clippy, nextest, audit, deny, findings)
        run: ./scripts/gate.sh

      # Build-level proof the arm64 target compiles — the Tier-0 seccomp allow-list
      # is arch-parameterized (S23 B4); this is the missing CI cross-check. `ring`'s
      # C needs the cross linker/compiler; std comes from the toolchain `targets`.
      - name: Install aarch64 cross linker + target libc headers
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross
      - name: aarch64 cross-check (cargo check --target aarch64-unknown-linux-gnu)
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          AR_aarch64_unknown_linux_gnu: aarch64-linux-gnu-ar
        run: cargo check --target aarch64-unknown-linux-gnu --locked
